# .github/workflows/python-run.yml
name: اجرای آنلاین کد پایتون
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4
      - name: راه‌اندازی پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: اجرای اسکریپت
        run: |
          python main.py
